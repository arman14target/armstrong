name: Tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "admin/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "admin/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

# Newer run cancels an in-progress one for the same ref (saves minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Prisma client (types) needed before typecheck/tests. No database used.
      - run: npx prisma generate
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
