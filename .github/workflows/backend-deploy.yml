name: Backend release

# Ordered release: apply Prisma migrations to Neon FIRST, then (optionally)
# trigger the Vercel backend deploy so new code never serves against an old
# schema. The deploy step is gated on a secret — until you set it (and switch
# the Vercel backend project to "no automatic git deploys"), Vercel keeps
# auto-deploying and only the migration runs here.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

# Never cancel a migration mid-run; let queued releases finish in order.
concurrency:
  group: backend-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Apply database migrations
        # DIRECT_URL = Neon direct (non-pooled) connection string.
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Trigger Vercel deploy (after migrations)
        # Runs only when the deploy-hook secret is set. Create a Deploy Hook in
        # the Vercel backend project and add it as VERCEL_BACKEND_DEPLOY_HOOK,
        # then set that project to skip automatic git deploys.
        if: ${{ env.HOOK != '' }}
        env:
          HOOK: ${{ secrets.VERCEL_BACKEND_DEPLOY_HOOK }}
        run: curl -fsSL -X POST "$HOOK"
