name: Release

# Conventional-commit driven releases. release-please opens/maintains a
# "release PR" that bumps the version + CHANGELOG; merging it tags the repo and
# creates a GitHub Release. Free; uses the built-in GITHUB_TOKEN.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
