version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      # One PR for all non-major frontend updates instead of one-per-package.
      frontend:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      backend:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      # Collapse all action bumps into a single PR (one CI run, not N).
      actions:
        patterns: ["*"]
