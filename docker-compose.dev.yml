# Local DEV stack with hot reload — source is bind-mounted and the dev servers
# (next dev / nest --watch) rebuild on change. No image rebuild per edit.
#
#   docker compose -f docker-compose.dev.yml up
#
# Web:  http://localhost:3000  (app at /app)
# API:  http://localhost:4000
#
# node_modules live in named volumes (not bind-mounted), so the container keeps
# its own Linux/musl install — host node_modules never clobber it. First `up`
# runs npm install (slow once, cached after in the volume).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armstrong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armstrong}
      POSTGRES_DB: ${POSTGRES_DB:-armstrong}
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-armstrong}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: node:22-alpine
    working_dir: /app
    # Install once into the node_modules volume (skip if already there), then
    # generate the Prisma client, apply migrations, and start the watch server.
    command: sh -c "[ -d node_modules/@nestjs ] || npm ci; npx prisma generate; npx prisma migrate deploy; npm run start:dev"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-armstrong}:${POSTGRES_PASSWORD:-armstrong}@db:5432/${POSTGRES_DB:-armstrong}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-armstrong}:${POSTGRES_PASSWORD:-armstrong}@db:5432/${POSTGRES_DB:-armstrong}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-secret}
      ADMIN_JWT_EXPIRES_IN: ${ADMIN_JWT_EXPIRES_IN:-12h}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      FOURSQUARE_SERVICE_TOKEN: ${FOURSQUARE_SERVICE_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      # Reliable file watching through the bind mount.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - api-node-modules:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "[ -d node_modules/next ] || npm ci; npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      # Browser reaches the API on the host port. Overrides any .env.local value
      # (real env vars win over .env files in Next).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_GEMINI_API_KEY: ${NEXT_PUBLIC_GEMINI_API_KEY:-}
      NEXT_PUBLIC_GEMINI_MODEL: ${NEXT_PUBLIC_GEMINI_MODEL:-}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - web-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Admin app is omitted from the dev stack to keep it lean. To work on it, add
  # a service mirroring `web` with ./admin, port 3001, and `npm run dev`.

volumes:
  db-data-dev:
  api-node-modules:
  web-node-modules:
