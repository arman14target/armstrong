services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armstrong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armstrong}
      POSTGRES_DB: ${POSTGRES_DB:-armstrong}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-armstrong}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-armstrong}:${POSTGRES_PASSWORD:-armstrong}@db:5432/${POSTGRES_DB:-armstrong}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-armstrong}:${POSTGRES_PASSWORD:-armstrong}@db:5432/${POSTGRES_DB:-armstrong}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-secret}
      ADMIN_JWT_EXPIRES_IN: ${ADMIN_JWT_EXPIRES_IN:-12h}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      FOURSQUARE_SERVICE_TOKEN: ${FOURSQUARE_SERVICE_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:8081}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        # Pulled from your shell / .env at build time. All optional.
        NEXT_PUBLIC_GEMINI_API_KEY: ${NEXT_PUBLIC_GEMINI_API_KEY:-}
        NEXT_PUBLIC_GEMINI_MODEL: ${NEXT_PUBLIC_GEMINI_MODEL:-}
        # URL the browser uses to reach the API (baked into the static bundle).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
